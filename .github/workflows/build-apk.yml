name: Build Android TV APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Pozwala na ręczne uruchomienie kompilacji w zakładce Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Gradle Wrapper
      run: |
        cd android-project
        gradle wrapper --gradle-version 8.2.2

    - name: Grant execute permission for gradlew
      run: |
        cd android-project
        chmod +x gradlew

    - name: Build Debug APK
      run: |
        cd android-project
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Apple-Music-TV-Wrapper-APK
        path: android-project/app/build/outputs/apk/debug/app-debug.apk
